services:
  create-project-linux:
    image: mcr.microsoft.com/dotnet/runtime:8.0
    profiles: ["linux"]
    working_dir: /model
    volumes:
      - ./model:/model
      - ./origam.env:/origam.env:ro
    entrypoint: ["/bin/bash", "-c", "sed -i 's/\r$//' /model/create-project.sh && bash /model/create-project.sh"]

  create-project-windows:
    image: mcr.microsoft.com/powershell:latest
    profiles: ["win"]
    working_dir: /model
    volumes:
      - ./model:/model
      - ./origam.env:/origam.env:ro
    entrypoint: ["pwsh", "-File", "/model/create-project.ps1"]

  origam-server:
    profiles: ["app"]
    image: origam/server:master-latest.linux
    container_name: origam-server
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "443:443"
    volumes:
      - "./model:/model-src"
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "Waiting for MyOrigamApp to be generated..."
        while [ ! -f /model-src/MyOrigamApp/docker/MyOrigamApp_Environments_Linux.env ]; do sleep 1; done
        echo "Linking project data..."
        mkdir -p /home/origam/projectData
        ln -sfn /model-src/MyOrigamApp/model /home/origam/projectData/model
        ln -sfn /model-src/MyOrigamApp/customAssets /home/origam/projectData/customAssets
        echo "Loading env vars..."
        while IFS= read -r line || [ -n "$$line" ]; do
          case "$$line" in ''|\#*) continue ;; esac
          key=$${line%%=*}
          value=$${line#*=}
          export "$$key=$$value"
        done < /model-src/MyOrigamApp/docker/MyOrigamApp_Environments_Linux.env
        exec ./entrypoint.sh
    depends_on:
      create-project-linux:
        condition: service_completed_successfully

  origam-architect:
    profiles: ["app"]
    image: origam/architect:master-latest.linux
    container_name: origam-architect
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "8081:8081"
    volumes:
      - "./model:/model-src"
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "Waiting for MyOrigamApp to be generated..."
        while [ ! -f /model-src/MyOrigamApp/docker/MyOrigamApp_Environments_Linux.env ]; do sleep 1; done
        echo "Linking project data..."
        mkdir -p /home/origam/projectData
        ln -sfn /model-src/MyOrigamApp/model /home/origam/projectData/model
        echo "Loading env vars..."
        while IFS= read -r line || [ -n "$$line" ]; do
          case "$$line" in ''|\#*) continue ;; esac
          key=$${line%%=*}
          value=$${line#*=}
          export "$$key=$$value"
        done < /model-src/MyOrigamApp/docker/MyOrigamApp_Environments_Linux.env
        exec ./entrypoint.sh
    depends_on:
      create-project-linux:
        condition: service_completed_successfully

volumes:
  mssql_data:
