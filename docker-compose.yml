name: ${PROJECT_NAME:-MyOrigamApp}

services:
  create-project-linux:
    image: mcr.microsoft.com/dotnet/runtime:8.0
    profiles: ["linux"]
    working_dir: /model
    volumes:
      - ./model:/model
      - ./.env:/.env:ro
    entrypoint: ["/bin/bash", "-c", "sed -i 's/\r$//' /model/create-project.sh && bash /model/create-project.sh"]
    depends_on:
      mssql:
        condition: service_healthy
        required: false
      postgres:
        condition: service_healthy
        required: false

  create-project-windows:
    image: mcr.microsoft.com/dotnet/sdk:8.0-windowsservercore-ltsc2022
    profiles: ["win"]
    isolation: process
    networks:
      - stable-nat
    working_dir: c:/model
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./model:c:/model
      - .:c:/src:ro
    environment:
      ORIGAM_CONFIG_FILE: "c:/src/.env"
    entrypoint: ["powershell", "-File", "c:/model/create-project.ps1"]
    depends_on:
      mssql:
        condition: service_healthy
        required: false
      postgres:
        condition: service_healthy
        required: false

  origam-server:
    profiles: ["app"]
    image: origam/server:master-latest.linux
    container_name: ${PROJECT_NAME:-MyOrigamApp}-server
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "${SERVER_PORT:-443}:443"
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-MyOrigamApp}
    volumes:
      - "./model:/model-src"
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "Waiting for $${PROJECT_NAME} to be generated..."
        while [ ! -f /model-src/$${PROJECT_NAME}/docker/$${PROJECT_NAME}_Environments_Linux.env ]; do sleep 1; done
        echo "Linking project data..."
        mkdir -p /home/origam/projectData
        ln -sfn /model-src/$${PROJECT_NAME}/model /home/origam/projectData/model
        ln -sfn /model-src/$${PROJECT_NAME}/customAssets /home/origam/projectData/customAssets
        echo "Loading env vars..."
        while IFS= read -r line || [ -n "$$line" ]; do
          case "$$line" in ''|\#*) continue ;; esac
          key=$${line%%=*}
          value=$${line#*=}
          export "$$key=$$value"
        done < /model-src/$${PROJECT_NAME}/docker/$${PROJECT_NAME}_Environments_Linux.env
        exec ./entrypoint.sh
    depends_on:
      create-project-linux:
        condition: service_completed_successfully

  origam-architect:
    profiles: ["app"]
    image: origam/architect:master-latest.linux
    container_name: ${PROJECT_NAME:-MyOrigamApp}-architect
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "${ARCHITECT_PORT:-8081}:8081"
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-MyOrigamApp}
    volumes:
      - "./model:/model-src"
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "Waiting for $${PROJECT_NAME} to be generated..."
        while [ ! -f /model-src/$${PROJECT_NAME}/docker/$${PROJECT_NAME}_Environments_Linux.env ]; do sleep 1; done
        echo "Linking project data..."
        mkdir -p /home/origam/projectData
        ln -sfn /model-src/$${PROJECT_NAME}/model /home/origam/projectData/model
        echo "Loading env vars..."
        while IFS= read -r line || [ -n "$$line" ]; do
          case "$$line" in ''|\#*) continue ;; esac
          key=$${line%%=*}
          value=$${line#*=}
          export "$$key=$$value"
        done < /model-src/$${PROJECT_NAME}/docker/$${PROJECT_NAME}_Environments_Linux.env
        exec ./entrypoint.sh
    depends_on:
      create-project-linux:
        condition: service_completed_successfully

  origam-server-windows:
    profiles: ["win-app"]
    image: ${ORIGAM_SERVER_IMAGE_WINDOWS:-origam/server:2026.3.0.4198.win-nano}
    container_name: ${PROJECT_NAME:-MyOrigamApp}-server
    restart: unless-stopped
    isolation: process
    networks:
      - stable-nat
    stdin_open: true
    tty: true
    ports:
      - "${SERVER_PORT:-443}:443"
      - "8080:8080"
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-MyOrigamApp}
    volumes:
      - "./model:c:/model-src"
    entrypoint:
      - pwsh
      - -ExecutionPolicy
      - Bypass
      - -Command
      - |
        $$projectName = $$env:PROJECT_NAME
        Write-Host "Waiting for $$projectName to be generated..."
        $$envFile = "c:\model-src\$$projectName\docker\$${projectName}_Environments_Windows.env"
        $$envFileFallback = "c:\model-src\$$projectName\docker\$${projectName}_Environments_Linux.env"
        while (-not (Test-Path $$envFile) -and -not (Test-Path $$envFileFallback)) { Start-Sleep -Seconds 1 }
        if (-not (Test-Path $$envFile)) { $$envFile = $$envFileFallback }
        Write-Host "Loading env vars from $$envFile..."
        Get-Content $$envFile | ForEach-Object {
            $$line = $$_.Trim()
            if ($$line -and -not $$line.StartsWith('#')) {
                $$kv = $$line -split '=', 2
                if ($$kv.Length -eq 2) {
                    [System.Environment]::SetEnvironmentVariable($$kv[0].Trim(), $$kv[1].Trim(), 'Process')
                }
            }
        }
        [System.Environment]::SetEnvironmentVariable('CustomAssetsConfig__PathToCustomAssetsFolder', 'C:\home\origam\projectData\customAssets', 'Process')
        Write-Host "Linking project data..."
        $$dataPath = "C:\home\origam\projectData"
        if (Test-Path $$dataPath) { Remove-Item -Recurse -Force $$dataPath }
        New-Item -ItemType Directory -Path $$dataPath -Force | Out-Null
        Copy-Item -Path "c:\model-src\$$projectName\model" -Destination "$$dataPath\model" -Recurse -Force
        if (Test-Path "c:\model-src\$$projectName\customAssets") {
            Copy-Item -Path "c:\model-src\$$projectName\customAssets" -Destination "$$dataPath\customAssets" -Recurse -Force
        }
        Write-Host "Starting EntryPoint.ps1..."
        Set-Location C:\home\origam
        & .\EntryPoint.ps1
    depends_on:
      create-project-windows:
        condition: service_completed_successfully

  origam-architect-windows:
    profiles: ["win-app"]
    image: ${ORIGAM_ARCHITECT_IMAGE_WINDOWS:-origam/architect:2026.4.alpha.4213.win-nano}
    container_name: ${PROJECT_NAME:-MyOrigamApp}-architect
    restart: unless-stopped
    isolation: process
    networks:
      - stable-nat
    stdin_open: true
    tty: true
    ports:
      - "${ARCHITECT_PORT:-8081}:8081"
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-MyOrigamApp}
    volumes:
      - "./model:c:/model-src"
    entrypoint:
      - pwsh
      - -ExecutionPolicy
      - Bypass
      - -Command
      - |
        $$projectName = $$env:PROJECT_NAME
        Write-Host "Waiting for $$projectName to be generated..."
        $$envFile = "c:\model-src\$$projectName\docker\$${projectName}_Environments_Windows.env"
        $$envFileFallback = "c:\model-src\$$projectName\docker\$${projectName}_Environments_Linux.env"
        while (-not (Test-Path $$envFile) -and -not (Test-Path $$envFileFallback)) { Start-Sleep -Seconds 1 }
        if (-not (Test-Path $$envFile)) { $$envFile = $$envFileFallback }
        Write-Host "Loading env vars from $$envFile..."
        Get-Content $$envFile | ForEach-Object {
            $$line = $$_.Trim()
            if ($$line -and -not $$line.StartsWith('#')) {
                $$kv = $$line -split '=', 2
                if ($$kv.Length -eq 2) {
                    [System.Environment]::SetEnvironmentVariable($$kv[0].Trim(), $$kv[1].Trim(), 'Process')
                }
            }
        }
        Write-Host "Linking project data..."
        $$dataPath = "C:\home\origam\projectData"
        if (Test-Path $$dataPath) { Remove-Item -Recurse -Force $$dataPath }
        New-Item -ItemType Directory -Path $$dataPath -Force | Out-Null
        Copy-Item -Path "c:\model-src\$$projectName\model" -Destination "$$dataPath\model" -Recurse -Force
        Write-Host "Copying template file..."
        Copy-Item "C:\home\origam\Architect\_OrigamSettings.template" "C:\home\origam\_OrigamSettings.template" -Force
        Write-Host "Starting EntryPoint.ps1..."
        Set-Location C:\home\origam\Architect
        & .\EntryPoint.ps1
    depends_on:
      create-project-windows:
        condition: service_completed_successfully

  mssql:
    profiles: ["mssql"]
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ${PROJECT_NAME:-MyOrigamApp}-mssql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-1433}:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD:-yourStrong(!)Password}
      MSSQL_PID: Developer
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres:
    profiles: ["postgres"]
    image: postgres:16
    container_name: ${PROJECT_NAME:-MyOrigamApp}-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: postgres
      PGUSER: ${DB_USERNAME:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./model/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mssql_data:
  postgres_data:

networks:
  stable-nat:
    name: stable-nat
    driver: nat
    ipam:
      config:
        - subnet: 172.20.0.0/20
          gateway: 172.20.0.1
