name: ${PROJECT_NAME:-MyOrigamApp}

services:
  create-project-linux:
    image: mcr.microsoft.com/dotnet/runtime:8.0
    profiles: ["linux"]
    working_dir: /model
    volumes:
      - ./model:/model
      - ./.env:/.env:ro
    entrypoint: ["/bin/bash", "-c", "sed -i 's/\r$//' /model/create-project.sh && bash /model/create-project.sh"]
    depends_on:
      mssql:
        condition: service_healthy
        required: false
      postgres:
        condition: service_healthy
        required: false

  create-project-windows:
    image: mcr.microsoft.com/powershell:latest
    profiles: ["win"]
    working_dir: /model
    volumes:
      - ./model:/model
      - ./.env:/.env:ro
    entrypoint: ["pwsh", "-File", "/model/create-project.ps1"]
    depends_on:
      mssql:
        condition: service_healthy
        required: false
      postgres:
        condition: service_healthy
        required: false

  origam-server:
    profiles: ["app"]
    image: origam/server:master-latest.linux
    container_name: ${PROJECT_NAME:-MyOrigamApp}-server
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "${SERVER_PORT:-443}:443"
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-MyOrigamApp}
    volumes:
      - "./model:/model-src"
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "Waiting for $${PROJECT_NAME} to be generated..."
        while [ ! -f /model-src/$${PROJECT_NAME}/docker/$${PROJECT_NAME}_Environments_Linux.env ]; do sleep 1; done
        echo "Linking project data..."
        mkdir -p /home/origam/projectData
        ln -sfn /model-src/$${PROJECT_NAME}/model /home/origam/projectData/model
        ln -sfn /model-src/$${PROJECT_NAME}/customAssets /home/origam/projectData/customAssets
        echo "Loading env vars..."
        while IFS= read -r line || [ -n "$$line" ]; do
          case "$$line" in ''|\#*) continue ;; esac
          key=$${line%%=*}
          value=$${line#*=}
          export "$$key=$$value"
        done < /model-src/$${PROJECT_NAME}/docker/$${PROJECT_NAME}_Environments_Linux.env
        exec ./entrypoint.sh
    depends_on:
      create-project-linux:
        condition: service_completed_successfully

  origam-architect:
    profiles: ["app"]
    image: origam/architect:master-latest.linux
    container_name: ${PROJECT_NAME:-MyOrigamApp}-architect
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "${ARCHITECT_PORT:-8081}:8081"
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-MyOrigamApp}
    volumes:
      - "./model:/model-src"
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "Waiting for $${PROJECT_NAME} to be generated..."
        while [ ! -f /model-src/$${PROJECT_NAME}/docker/$${PROJECT_NAME}_Environments_Linux.env ]; do sleep 1; done
        echo "Linking project data..."
        mkdir -p /home/origam/projectData
        ln -sfn /model-src/$${PROJECT_NAME}/model /home/origam/projectData/model
        echo "Loading env vars..."
        while IFS= read -r line || [ -n "$$line" ]; do
          case "$$line" in ''|\#*) continue ;; esac
          key=$${line%%=*}
          value=$${line#*=}
          export "$$key=$$value"
        done < /model-src/$${PROJECT_NAME}/docker/$${PROJECT_NAME}_Environments_Linux.env
        exec ./entrypoint.sh
    depends_on:
      create-project-linux:
        condition: service_completed_successfully

  mssql:
    profiles: ["mssql"]
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ${PROJECT_NAME:-MyOrigamApp}-mssql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-1433}:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD:-yourStrong(!)Password}
      MSSQL_PID: Developer
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres:
    profiles: ["postgres"]
    image: postgres:16
    container_name: ${PROJECT_NAME:-MyOrigamApp}-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: postgres
      PGUSER: ${DB_USERNAME:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./model/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mssql_data:
  postgres_data:
