name: ${PROJECT_NAME}

services:
  origam-composer-linux:
    image: origam/composer:2026.4.alpha.4232.linux
    profiles: ["linux"]
    volumes:
      - .:/model
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
       
        exec dotnet /home/origam/Composer/Origam.Composer.dll create \
          --commands-output-format cmd \
          --db-type "${DB_TYPE}" \
          --db-host "${DB_HOST}" \
          --db-port "${DB_PORT}" \
          --db-name "${DB_NAME}" \
          --db-username "${DB_USERNAME}" \
          --db-password "${DB_PASSWORD}" \
          --p-name "${PROJECT_NAME}" \
          --p-folder "/model" \
          --p-admin-username "${ADMIN_USERNAME}" \
          --p-admin-password "${ADMIN_PASSWORD}" \
          --p-admin-email "${ADMIN_EMAIL}" \
          --p-docker-image-linux "origam/server:local.linux" \
          --p-docker-image-win "origam/server:local.win-nano" \
          --arch-docker-image-linux "origam/architect:local.linux" \
          --arch-docker-image-win "origam/architect:local.win-nano" \
          --arch-port "8081"

  origam-server-linux:
    profiles: ["linux"]
    image: origam/server:2026.4.alpha.4232.linux
    container_name: ${PROJECT_NAME}-server-linux
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "443:443"
    environment:
      PROJECT_NAME: ${PROJECT_NAME}
      ORIGAM_PROJECT_BOOTSTRAP: ${ORIGAM_PROJECT_BOOTSTRAP:-true}
    volumes:
      - "./:/model-src"
    depends_on:
      origam-composer-linux:
        condition: service_completed_successfully

  origam-architect-linux:
    profiles: ["linux"]
    image: origam/architect:2026.4.alpha.4232.linux
    container_name: ${PROJECT_NAME}-architect-linux
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "8081:8081"
    environment:
      PROJECT_NAME: ${PROJECT_NAME}
      ORIGAM_PROJECT_BOOTSTRAP: ${ORIGAM_PROJECT_BOOTSTRAP:-true}
    volumes:
      - "./:/model-src"
    depends_on:
      origam-composer-linux:
        condition: service_completed_successfully

  origam-composer-windows:
    image: origam/composer:2026.4.alpha.4232.win-nano
    profiles: ["windows"]
    container_name: ${PROJECT_NAME}-composer-windows
    isolation: hyperv
    volumes:
      - "./:c:/work"
    networks:
      - stable-nat
    command:
      - create
      - --commands-output-format
      - cmd
      - --db-type
      - ${DB_TYPE}
      - --db-host
      - ${DB_HOST}
      - --db-port
      - ${DB_PORT}
      - --db-name
      - ${DB_NAME}
      - --db-username
      - ${DB_USERNAME}
      - --db-password
      - ${DB_PASSWORD}
      - --p-name
      - ${PROJECT_NAME}
      - --p-folder
      - c:\\work
      - --p-admin-username
      - ${ADMIN_USERNAME}
      - --p-admin-password
      - ${ADMIN_PASSWORD}
      - --p-admin-email
      - ${ADMIN_EMAIL}
      - --p-docker-image-linux
      - origam/server:local.linux
      - --p-docker-image-win
      - origam/server:local.win-nano
      - --arch-docker-image-linux
      - origam/architect:local.linux
      - --arch-docker-image-win
      - origam/architect:local.win-nano
      - --arch-port
      - "8081"

  origam-server-windows:
    profiles: ["windows"]
    image: origam/server:2026.4.alpha.4232.win-nano
    container_name: ${PROJECT_NAME}-server-windows
    restart: unless-stopped
    isolation: process
    networks:
      - stable-nat
    stdin_open: true
    tty: true
    ports:
      - "443:443"
      - "8080:8080"
    environment:
      PROJECT_NAME: ${PROJECT_NAME}
      ORIGAM_PROJECT_BOOTSTRAP: ${ORIGAM_PROJECT_BOOTSTRAP:-true}
    volumes:
      - "./:c:/model-src"
    depends_on:
      origam-composer-windows:
        condition: service_completed_successfully

  origam-architect-windows:
    profiles: ["windows"]
    image: origam/architect:2026.4.alpha.4232.win-nano
    container_name: ${PROJECT_NAME}-architect-windows
    restart: unless-stopped
    isolation: process
    networks:
      - stable-nat
    stdin_open: true
    tty: true
    ports:
      - "8081:8081"
    environment:
      PROJECT_NAME: ${PROJECT_NAME}
      ORIGAM_PROJECT_BOOTSTRAP: ${ORIGAM_PROJECT_BOOTSTRAP:-true}
    volumes:
      - "./:c:/model-src"
    depends_on:
      origam-composer-windows:
        condition: service_completed_successfully

  mssql:
    profiles: ["mssql"]
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ${PROJECT_NAME}-mssql
    restart: unless-stopped
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD}
      MSSQL_PID: Developer
    volumes:
      - mssql_data:/var/opt/mssql

  postgres:
    profiles: ["postgres"]
    image: postgres:16
    container_name: ${PROJECT_NAME}-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: postgres
      PGUSER: ${DB_USERNAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  mssql_data:
  postgres_data:

networks:
  stable-nat:
    name: stable-nat
    driver: nat
    ipam:
      config:
        - subnet: 172.20.0.0/20
          gateway: 172.20.0.1



