services:
  # TODO: Rename "create-project-linux" and "create-project-windows" to something more generic 
  create-project-linux:
    image: mcr.microsoft.com/dotnet/runtime:8.0
    profiles: ["linux"]
    working_dir: /model
    volumes:
      - ./model:/model
    entrypoint: ["/bin/bash", "-c", "sed -i 's/\r$//' /model/create-project.sh && bash /model/create-project.sh"]

  create-project-windows:
    image: mcr.microsoft.com/powershell:latest
    profiles: ["win"]
    working_dir: /model
    volumes:
      - ./model:/model
    entrypoint: ["pwsh", "-File", "/model/create-project.ps1"]

  origam-server:
    profiles: ["app"]
    image: origam/server:master-latest.linux
    container_name: origam-server
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "443:443"
    volumes:
      - "./model/MyOrigamApp/model:/home/origam/projectData/model"
      - "./model/MyOrigamApp/customAssets:/home/origam/projectData/customAssets"
      - "./model/MyOrigamApp/docker:/envdir:ro"
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "Waiting for env file..."
        while [ ! -s /envdir/MyOrigamApp_Environments_Linux.env ]; do sleep 1; done
        echo "Loading env vars..."
        while IFS= read -r line || [ -n "$$line" ]; do
          case "$$line" in ''|\#*) continue ;; esac
          key=$${line%%=*}
          value=$${line#*=}
          export "$$key=$$value"
        done < /envdir/MyOrigamApp_Environments_Linux.env
        exec ./entrypoint.sh
    depends_on:
      create-project-linux:
        condition: service_completed_successfully
        required: false
      create-project-windows:
        condition: service_completed_successfully
        required: false

  origam-architect:
    profiles: ["app"]
    image: origam/architect:master-latest.linux
    container_name: origam-architect
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "8081:8081"
    volumes:
      - "./model/MyOrigamApp/model:/home/origam/projectData/model"
      - "./model/MyOrigamApp/docker:/envdir:ro"
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "Waiting for env file..."
        while [ ! -s /envdir/MyOrigamApp_Environments_Linux.env ]; do sleep 1; done
        echo "Loading env vars..."
        while IFS= read -r line || [ -n "$$line" ]; do
          case "$$line" in ''|\#*) continue ;; esac
          key=$${line%%=*}
          value=$${line#*=}
          export "$$key=$$value"
        done < /envdir/MyOrigamApp_Environments_Linux.env
        exec ./entrypoint.sh
    depends_on:
      create-project-linux:
        condition: service_completed_successfully
        required: false
      create-project-windows:
        condition: service_completed_successfully
        required: false

volumes:
  mssql_data:
